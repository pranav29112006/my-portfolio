<section id="contact" class="py-24 px-6 bg-slate-900">
  <div class="max-w-3xl mx-auto">
    <h2 class="text-4xl font-bold text-center mb-12 text-cyan-400">
      Contact Me
    </h2>

    <form class="space-y-6" onsubmit="event.preventDefault();">
      <input type="text" placeholder="Name" class="w-full px-4 py-3 rounded-xl bg-slate-800" />
      <input type="email" placeholder="Email" class="w-full px-4 py-3 rounded-xl bg-slate-800" />
      <textarea rows="5" placeholder="Message" class="w-full px-4 py-3 rounded-xl bg-slate-800"></textarea>

      <button type="submit" class="bg-cyan-400 text-black px-6 py-3 rounded-xl font-semibold">
        Send Message
      </button>
    </form>
  </div>
</section>
